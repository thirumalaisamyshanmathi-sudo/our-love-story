<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabarish ❤️ Shanmathi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Playfair+Display:ital@0;1&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0a0003;overflow:hidden;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.bg{position:absolute;inset:0;transition:background 1.5s ease;z-index:0;}
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
.particle{position:absolute;border-radius:50%;animation:pFloat linear infinite;}
@keyframes pFloat{0%{transform:translateY(100vh);opacity:0;}10%{opacity:0.8;}90%{opacity:0.4;}100%{transform:translateY(-60px);opacity:0;}}
.wrap{position:relative;z-index:2;width:100%;max-width:600px;padding:20px 24px;text-align:center;}
.illu{width:100%;height:180px;margin-bottom:16px;}
.illu svg{width:100%;height:100%;}
.illu img{width:100%;height:100%;object-fit:cover;border-radius:14px;box-shadow:0 0 25px rgba(192,0,34,.35);}
.s-date{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:4px;color:#c0002288;text-transform:uppercase;margin-bottom:8px;opacity:0;transition:none;}
.s-title{font-family:'Great Vibes',cursive;font-size:clamp(28px,6vw,50px);color:#ff4466;text-shadow:0 0 30px #c0002244;margin-bottom:12px;opacity:0;transition:none;line-height:1.2;}
.s-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(14px,2.5vw,17px);color:#ffcccc;line-height:1.75;max-width:460px;margin:0 auto;opacity:0;transition:none;}
.s-sub{font-family:'Playfair Display',serif;font-size:12px;color:#ff8899;letter-spacing:2px;margin-top:12px;opacity:0;transition:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.a1{animation:fadeUp 0.8s ease 0s forwards;}
.a2{animation:fadeUp 0.8s ease 0.3s forwards;}
.a3{animation:fadeUp 0.8s ease 0.65s forwards;}
.a4{animation:fadeUp 0.8s ease 1s forwards;}
.prog-wrap{position:fixed;bottom:0;left:0;width:100%;height:3px;background:#ffffff11;z-index:10;}
.prog{height:100%;background:linear-gradient(90deg,#8b0000,#cc0022,#ff4466);width:0%;box-shadow:0 0 8px #cc0022;}
.controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:20;}
.ctrl{background:#c0002222;border:1px solid #c0002255;color:#ff8899;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:all 0.2s;font-family:sans-serif;}
.ctrl:hover{background:#c0002255;}
.dots{display:flex;gap:4px;align-items:center;flex-wrap:wrap;max-width:200px;justify-content:center;}
.dot{width:5px;height:5px;border-radius:50%;background:#ffffff22;cursor:pointer;transition:all 0.3s;flex-shrink:0;}
.dot.active{background:#cc0022;box-shadow:0 0 5px #cc0022;width:14px;border-radius:3px;}
.tap{position:fixed;inset:0;z-index:100;background:#0a0003;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 1s;}
.tap-h{font-size:66px;animation:hb 1.5s ease-in-out infinite;filter:drop-shadow(0 0 20px #c00022);}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.14);};}
.tap-t{font-family:'Great Vibes',cursive;font-size:clamp(34px,7vw,58px);color:#cc0022;text-shadow:0 0 20px #cc002266;margin-top:14px;animation:gl 2s ease-in-out infinite alternate;}
@keyframes gl{from{text-shadow:0 0 10px #cc002244;}to{text-shadow:0 0 30px #cc0022cc;}}
.tap-s{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:#ff8899;margin-top:8px;opacity:0.7;}
#yw{position:fixed;bottom:-300px;left:-300px;width:1px;height:1px;opacity:0;pointer-events:none;}
.m-ind{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:8px;background:#1a000acc;border:1px solid #c0002444;border-radius:40px;padding:6px 16px;font-family:'Cormorant Garamond',serif;font-size:13px;color:#ff8899;backdrop-filter:blur(6px);z-index:20;font-style:italic;}
.m-ind.show{display:flex;}
.mb{display:flex;align-items:flex-end;gap:2px;height:13px;}
.mbar{width:3px;background:#cc0022;border-radius:2px;animation:mba 0.7s ease infinite;}
.mbar:nth-child(1){height:5px;animation-delay:0s;}.mbar:nth-child(2){height:11px;animation-delay:0.12s;}.mbar:nth-child(3){height:7px;animation-delay:0.25s;}.mbar:nth-child(4){height:13px;animation-delay:0.08s;}.mbar:nth-child(5){height:6px;animation-delay:0.2s;}
@keyframes mba{0%,100%{transform:scaleY(0.3);}50%{transform:scaleY(1);}}
</style>
</head>
<body>
<div id="yw"><div id="yp"></div></div>
<div class="m-ind" id="mi"><div class="mb"><div class="mbar"></div><div class="mbar"></div><div class="mbar"></div><div class="mbar"></div><div class="mbar"></div></div><span>munbe vaa ♪</span></div>
<div class="tap" id="tap" onclick="start()">
  <div class="tap-h">❤️</div>
  <div class="tap-t">Sabarish ❤️ Shanmathi</div>
  <div class="tap-s">tap anywhere to begin our story...</div>
</div>
<div class="screen">
  <div class="bg" id="bg"></div>
  <div class="particles" id="ptcl"></div>
  <div class="wrap">
    <div class="illu" id="illu"></div>
    <div class="s-date" id="sd"></div>
    <div class="s-title" id="st"></div>
    <div class="s-text" id="sx"></div>
    <div class="s-sub" id="ss"></div>
  </div>
</div>
<div class="prog-wrap"><div class="prog" id="prog"></div></div>
<div class="controls">
  <button class="ctrl" onclick="go(cur-1)">&#8249;</button>
  <div class="dots" id="dots"></div>
  <button class="ctrl" onclick="go(cur+1)">&#8250;</button>
</div>

let cur=0,tmr=null;
const DUR=8000;

const dotsEl=document.getElementById('dots');
SC.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.onclick=()=>go(i);
  dotsEl.appendChild(d);
});

const COLORS={pink:['#ff4466','#ff8899','#ffaabb'],red:['#cc0022','#ff2244','#ff6677'],rose:['#cc0033','#ff3355','#ff99aa'],gold:['#cc8800','#ffaa00','#ffcc44'],dark:['#330011','#440022'],blue:['#2233aa','#3344cc']};

function spawnPtcl(type){
  const pl=document.getElementById('ptcl');pl.innerHTML='';
  const c=COLORS[type]||COLORS.pink;
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${Math.random()*100}%;width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;background:${c[Math.floor(Math.random()*c.length)]};opacity:0.6;animation-duration:${5+Math.random()*7}s;animation-delay:${Math.random()*5}s;`;
    pl.appendChild(p);
  }
}

function go(idx){
  cur=((idx%SC.length)+SC.length)%SC.length;
  const s=SC[cur];
  document.getElementById('bg').style.background=s.bg;
  document.getElementById('illu').innerHTML=s.svg;
  ['sd','st','sx','ss'].forEach(id=>{
    const el=document.getElementById(id);
    el.className=el.className.split(' ')[0];
    void el.offsetWidth;
  });
  document.getElementById('sd').textContent=s.date;
  document.getElementById('st').textContent=s.title;
  document.getElementById('sx').textContent=s.text;
  document.getElementById('ss').textContent=s.sub;
  document.getElementById('sd').classList.add('a1');
  document.getElementById('st').classList.add('a2');
  document.getElementById('sx').classList.add('a3');
  document.getElementById('ss').classList.add('a4');
  spawnPtcl(s.pc);
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
  const bar=document.getElementById('prog');
  bar.style.transition='none';bar.style.width='0%';
  clearTimeout(tmr);
  setTimeout(()=>{bar.style.transition=`width ${DUR}ms linear`;bar.style.width='100%';},60);
  tmr=setTimeout(()=>go(cur+1),DUR);
}

function start(){
  const ov=document.getElementById('tap');
  ov.style.opacity='0';ov.style.pointerEvents='none';
  setTimeout(()=>ov.style.display='none',1000);
  go(0);
  if(!document.getElementById('ys')){
    const t=document.createElement('script');t.id='ys';t.src='https://www.youtube.com/iframe_api';document.head.appendChild(t);
  }
}
window.onYouTubeIframeAPIReady=function(){
  new YT.Player('yp',{height:'1',width:'1',videoId:'Spm8T8-aSz4',
  playerVars:{autoplay:1,loop:1,playlist:'Spm8T8-aSz4',controls:0,fs:0,rel:0,modestbranding:1,playsinline:1},
  events:{onReady:function(e){e.target.setVolume(80);e.target.playVideo();document.getElementById('mi').classList.add('show');}}});
};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(cur+1);if(e.key==='ArrowLeft')go(cur-1);});
</script>
